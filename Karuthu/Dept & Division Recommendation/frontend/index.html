<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escalation Prediction</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

    <div class="container mt-5">

        <div class="card shadow">
            <div class="card-header">
                <h4>Escalation Prediction</h4>
            </div>

            <div class="card-body">

                <!-- Feedback -->
                <div class="mb-3">
                    <label class="form-label">
                        Question
                    </label>
                    <textarea id="feedback" class="form-control" rows="4" placeholder="Enter the Question"></textarea>
                </div>
                <div id="feedbackMessage" class="text-danger mt-1" style="display:none;">
                </div>

                <!-- Department -->
                <div class="mb-3">
                    <label class="form-label">
                        Department
                    </label>

                    <input type="text" id="department" class="form-control" placeholder="Department">
                </div>

                <!-- Division -->
                <div class="mb-3">
                    <label class="form-label">
                        Division
                    </label>

                    <input type="text" id="division" class="form-control" placeholder="Division">
                </div>

                <button class="btn btn-primary" onclick="predictDepartment()">
                    Predict
                </button>

                <button class="btn btn-success ms-2" onclick="saveEscalation()">
                    Save
                </button>

            </div>
        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
