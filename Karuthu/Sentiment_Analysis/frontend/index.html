<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Feedback Sentiment Analysis</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container py-5">

    <div class="card shadow">

        <div class="card-header bg-primary text-white">
            <h3>Feedback Sentiment Analysis</h3>
        </div>

        <div class="card-body">

            <label class="form-label fw-bold">
                Feedback
            </label>

            <textarea
                id="feedback"
                rows="6"
                class="form-control"
                placeholder="Enter feedback..."></textarea>

            <button
                id="analyzeBtn"
                class="btn btn-success mt-3">

                Analyze Feedback

            </button>

        </div>

    </div>


    <div
        id="resultSection"
        class="mt-4"
        style="display:none;">

        <div class="card shadow">

            <div class="card-header">
                <h4>Overall Result</h4>
            </div>

            <div class="card-body">

                <div class="row">

                    <div class="col-md-3">

                        <span class="fw-bolder d-inline-block">Sentiment : </span>

                        <span
                            id="overallSentiment"
                            class="badge fs-5">
                        </span>

                    </div>

                    <!-- <div class="col-md-3">

                        <h5>Positive</h5>

                        <div class="progress">

                            <div
                                id="positiveBar"
                                class="progress-bar bg-success">
                            </div>

                        </div>

                    </div>

                    <div class="col-md-3">

                        <h5>Neutral</h5>

                        <div class="progress">

                            <div
                                id="neutralBar"
                                class="progress-bar bg-warning text-dark">
                            </div>

                        </div>

                    </div>

                    <div class="col-md-3">

                        <h5>Negative</h5>

                        <div class="progress">

                            <div
                                id="negativeBar"
                                class="progress-bar bg-danger">
                            </div>

                        </div>

                    </div> -->

                </div>

                <hr>

                <h5>Sentence Analysis</h5>

                <table class="table table-bordered">

                    <thead class="table-light">

                    <tr>

                        <th>Sentence</th>
                        <th>Positive</th>
                        <th>Neutral</th>
                        <th>Negative</th>
                        <th>Sentiment</th>

                    </tr>

                    </thead>

                    <tbody id="sentenceTable">

                    </tbody>

                </table>

            </div>

        </div>

    </div>

</div>

<script src="script.js"></script>

</body>

</html>
